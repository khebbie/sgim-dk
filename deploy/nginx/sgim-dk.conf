# Production vhost for sgim.dk (sgim-0lt.5).
#
# NOT active until the certificate exists — nginx refuses to start if
# ssl_certificate points at a missing file, which would take the blog down too.
# deploy/cutover-sgim-dk.sh installs this only after certbot has issued the cert.
#
# Routing is identical to the staging vhost; see sgim.conf for why /api is not
# blanket-denied (SvelteKit owns /api/v1/events/ics) and why upstreams are
# resolved at request time.

# www -> apex, so there is exactly one canonical origin. Two origins would
# break form POSTs (adapter-node checks Origin against ORIGIN) and split SEO.
server {
    listen 443 ssl;
    http2 on;
    server_name www.sgim.dk;

    ssl_certificate     /etc/letsencrypt/live/sgim.dk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgim.dk/privkey.pem;

    return 301 https://sgim.dk$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name sgim.dk;

    ssl_certificate     /etc/letsencrypt/live/sgim.dk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgim.dk/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/calendar;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=15552000" always;

    location /admin {
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }

    location ~ ^/(content-manager|content-type-builder|upload|i18n|users-permissions|content-releases|review-workflows|preview|strapi) {
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }

    location ~ ^/admin/(auth|login|register|forgot-password|reset-password) {
        limit_req zone=sgim_admin_login burst=5 nodelay;
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }

    location /uploads/ {
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        set $web_upstream http://web:3000;
        proxy_pass $web_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }
}
