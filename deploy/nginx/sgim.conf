# Edge vhost for the sgim site (sgim-0lt.4).
#
# Loaded into the existing edge nginx (the khebbie-blog container) alongside the
# blog's own config. The blog keeps its vhost; this file adds the sgim hosts.
#
# ROUTING MODEL
#   /                 -> web  (SvelteKit, SSR)
#   /uploads/         -> cms  (media: mediaUrl() returns RELATIVE Strapi urls,
#                              so images are fetched from THIS origin)
#   /admin + support  -> cms  (the Strapi admin panel must be usable)
#   /api/...          -> web  — deliberately NOT routed to Strapi. SvelteKit
#                              owns /api/v1/* (the ICS feed); Strapi's content
#                              API is simply never proxied, which is what keeps
#                              it private. Do NOT add a blanket `/api` deny:
#                              that would break the calendar subscription feed.

# Websocket upgrade plumbing used by sgim-proxy-headers.inc.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Throttle admin authentication attempts (declared here, in the http context).
limit_req_zone $binary_remote_addr zone=sgim_admin_login:1m rate=10r/m;

server {
    listen 443 ssl;
    http2 on;
    server_name sgim.khebbie.dk;

    ssl_certificate     /etc/letsencrypt/live/sgim.khebbie.dk/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgim.khebbie.dk/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # CMS media can be large; SSR responses never are.
    client_max_body_size 25m;

    # Docker's embedded DNS. Resolving upstreams at REQUEST time (via the
    # variables below) rather than at startup means nginx still boots — and the
    # blog stays up — when the sgim stack is down; those requests just 502.
    resolver 127.0.0.11 valid=10s ipv6=off;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml text/calendar;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=15552000" always;

    # ---- Strapi admin panel ----
    # The admin SPA lives at /admin; it then calls these root-level endpoints.
    # All of them require an admin JWT, and none of them is the public content
    # API (/api), which stays unroutable from the internet.
    location /admin {
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }

    location ~ ^/(content-manager|content-type-builder|upload|i18n|users-permissions|content-releases|review-workflows|preview|strapi) {
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }

    # Admin login endpoints: throttle credential stuffing.
    location ~ ^/admin/(auth|login|register|forgot-password|reset-password) {
        limit_req zone=sgim_admin_login burst=5 nodelay;
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }

    # ---- CMS media ----
    location /uploads/ {
        set $cms_upstream http://cms:1337;
        proxy_pass $cms_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
        proxy_cache_valid 200 1h;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ---- the website ----
    location / {
        set $web_upstream http://web:3000;
        proxy_pass $web_upstream;
        include /etc/nginx/conf.d/sgim-proxy-headers.inc;
    }
}
