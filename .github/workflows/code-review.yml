name: LLM Code Review

# Inferential sensor (sgim-n25.9): an LLM reviews the PR diff against
# constitution.md + AGENTS.md and posts the findings as a single, updated PR
# comment.
#
# Policy: ADVISORY — this job never blocks a merge. It is a second opinion on
# semantic issues linters cannot see (redundant tests, brute-force fixes,
# over-engineering, constitution drift); a human decides what to act on. To
# escalate later, drop `continue-on-error` and fail on high-severity findings.
#
# Setup: requires the repository secret `LLM_API_KEY`. Optional repository
# variables `LLM_MODEL` and `LLM_API_URL` select a different model/provider
# (defaults: gpt-4o-mini via the OpenAI chat-completions API). Without the
# secret the job skips with a notice instead of failing every PR.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: code-review-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  code-review:
    name: LLM Code Review
    runs-on: ubuntu-latest
    # Advisory only - does not block the PR
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Need full history for accurate diff
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Check review is configured
        id: config
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::notice::LLM_API_KEY is not configured; skipping the advisory code review."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Get PR diff
        id: diff
        if: steps.config.outputs.enabled == 'true'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"

          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"

          git diff --no-color "$BASE_SHA" "$HEAD_SHA" > pr.diff || true
          if [ ! -s pr.diff ]; then
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            echo "empty=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.config.outputs.enabled == 'true' && steps.diff.outputs.empty == 'false'
        uses: actions/setup-node@v7
        with:
          # Node 24 runs the TypeScript review script directly (type stripping).
          node-version: '24'

      - name: Run LLM Code Review
        id: review
        if: steps.config.outputs.enabled == 'true' && steps.diff.outputs.empty == 'false'
        env:
          BASE_SHA: ${{ steps.diff.outputs.base_sha }}
          HEAD_SHA: ${{ steps.diff.outputs.head_sha }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ vars.LLM_MODEL }}
          LLM_API_URL: ${{ vars.LLM_API_URL }}
        run: node scripts/code-review.ts "$BASE_SHA" "$HEAD_SHA"

      - name: Post review as PR comment
        if: steps.config.outputs.enabled == 'true' && steps.diff.outputs.empty == 'false' && success()
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_FILE: llm-review.md
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync(process.env.REVIEW_FILE)) {
              core.notice('No review output produced; nothing to post.');
              return;
            }
            const body = '## LLM Code Review\n\n'
              + fs.readFileSync(process.env.REVIEW_FILE, 'utf8')
              + '\n\n_Advisory only — this review does not block the merge._';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.PR_NUMBER,
            });

            // Update our previous review comment instead of stacking new ones.
            const existingReview = comments.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('## LLM Code Review')
            );

            if (existingReview) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingReview.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: process.env.PR_NUMBER,
                body,
              });
            }
