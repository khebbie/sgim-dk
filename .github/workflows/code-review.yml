name: LLM Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

# ON HOLD: This workflow is prepared for sgim-n25.9 but waits on sgim-n25.7 (CI pipeline).
# When CI is enabled, uncomment this workflow file or merge it into the main CI workflow.
# This workflow is intentionally advisory (non-blocking) per the task requirements.

concurrency:
  group: code-review-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  code-review:
    name: LLM Code Review
    runs-on: ubuntu-latest
    # Advisory only - does not block the PR
    continue-on-error: true
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for accurate diff
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get PR diff
        id: diff
        run: |
          # Get the diff between base and head of the PR
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            # For push events, compare to previous commit
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          
          echo "base_sha=$BASE_SHA" >> $GITHUB_OUTPUT
          echo "head_sha=$HEAD_SHA" >> $GITHUB_OUTPUT
          
          # Get unified diff
          git diff --no-color $BASE_SHA $HEAD_SHA > pr.diff || true
          
          # Count lines changed for context
          DIFF_STATS=$(git diff --stat $BASE_SHA $HEAD_SHA || echo "")
          echo "diff_stats=$DIFF_STATS" >> $GITHUB_OUTPUT
          
          # Check if diff is empty
          if [ ! -s pr.diff ]; then
            echo "empty=true" >> $GITHUB_OUTPUT
          else
            echo "empty=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip if no changes
        if: steps.diff.outputs.empty == 'true'
        run: |
          echo "No changes to review, skipping code review."
          exit 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run LLM Code Review
        id: review
        env:
          BASE_SHA: ${{ steps.diff.outputs.base_sha }}
          HEAD_SHA: ${{ steps.diff.outputs.head_sha }}
        run: |
          # Use the code-review script
          node scripts/code-review.ts "$BASE_SHA" "$HEAD_SHA"

      - name: Post review as PR comment
        if: steps.diff.outputs.empty == 'false' && success()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_FILE: llm-review.md
        with:
          script: |
            const fs = require('fs');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: process.env.PR_NUMBER,
            });
            
            // Check if we already posted a review
            const existingReview = comments.find(c => 
              c.user.login === 'github-actions[bot]' && 
              c.body.includes('## LLM Code Review')
            );
            
            if (existingReview) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingReview.id,
                body: '## LLM Code Review\n\n' + fs.readFileSync(process.env.REVIEW_FILE, 'utf8'),
              });
            } else {
              // Post new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: process.env.PR_NUMBER,
                body: '## LLM Code Review\n\n' + fs.readFileSync(process.env.REVIEW_FILE, 'utf8'),
              });
            }

      - name: Output review summary
        run: |
          echo "Code review completed for PR #${{ github.event.pull_request.number }}"
          echo "Review findings:"
          cat llm-review.md
