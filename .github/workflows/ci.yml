name: CI

# Post-integration sensors (sgim-n25.7). CI deliberately calls the SAME mise
# tasks developers run locally — `mise run check` is the one source of truth for
# the gates, so "green locally" and "green in CI" cannot drift apart.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Quality gates
    runs-on: ubuntu-latest
    env:
      # Git hooks are a local developer aid; CI runs the gates directly.
      HUSKY: 0
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            cms/package-lock.json
            web/package-lock.json

      - name: Set up mise (task runner + pinned tools)
        uses: jdx/mise-action@v4

      # `npm ci` (not the mise install task's `npm install`): CI must install
      # exactly what the lockfiles pin and never rewrite them. The root package
      # carries the repo-wide tools (dependency-cruiser for `mise run
      # boundaries`), so it needs installing too — not just the two apps.
      - name: Install dependencies
        run: |
          npm ci
          npm --prefix cms ci
          npm --prefix web ci

      - name: Format check
        run: mise run format-check

      # lint + typecheck + test + architecture boundaries, both packages.
      - name: Check (lint, typecheck, test, boundaries)
        run: mise run check

      - name: Coverage thresholds
        run: mise run coverage

      # `strapi build` loads config/*.ts, which fail-fast on missing env vars.
      # The placeholder values in .env.example are enough to compile; no real
      # credentials are needed (or wanted) to prove the build works.
      - name: Build both packages
        run: |
          cp cms/.env.example cms/.env
          npm --prefix cms run build
          npm --prefix web run build

      - name: Summary
        if: always()
        run: echo "### Quality gates completed" >> "$GITHUB_STEP_SUMMARY"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks scans history, not just the tip

      - name: Set up mise (provides gitleaks)
        uses: jdx/mise-action@v4

      - name: Scan for committed secrets
        run: mise run secrets

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    # Advisory: the CMS's outstanding high/critical advisories are transitive
    # inside Strapi itself and npm's only "fix" is a semver-major downgrade to
    # Strapi 4 — a regression, not a fix. The job still runs and reports so the
    # signal is visible; revisit blocking once Strapi ships patched deps.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'

      - name: Audit dependencies
        run: |
          {
            echo "### Dependency audit"
            echo
            for pkg in cms web; do
              echo "#### $pkg"
              echo '```'
              (cd "$pkg" && npm audit --audit-level=high || true) 2>&1 | tail -25
              echo '```'
            done
          } >> "$GITHUB_STEP_SUMMARY"
          # Fail the (advisory) job when web — which we fully control — regresses.
          cd web && npm audit --audit-level=high

  # Publish deployable images (sgim-0lt.2). Built here, never on the 2 GB VPS,
  # where the Strapi admin build would likely OOM. Only on main and only after
  # the gates pass, so an unpublishable commit never produces a deploy tag.
  images:
    name: Build & push images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [web, cms]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagged with the commit SHA so a deploy pins an exact build and can be
      # rolled back to the previous SHA; `latest` is a convenience only.
      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sgim-${{ matrix.app }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/sgim-${{ matrix.app }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
